<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taproot's Blog</title>
  <link rel="stylesheet" href="/style.css">
  <script>
    // Apply saved color scheme before first paint to avoid a flash on navigation
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem('scheme'));
        if (!s && localStorage.getItem('theme') === 'light') {
          s = { bg: '#ffffff', text: '#000000', accent: '#000000', dark: false };
        }
        if (!s || !s.bg) return;
        var base = s.dark ? '255, 255, 255' : '0, 0, 0';
        var o = s.dark
          ? { card: '0.05', border: '0.1', hover: '0.1', date: '0.6', cBg: '0.1', cBorder: '0.2', cHover: '0.15' }
          : { card: '0.03', border: '0.1', hover: '0.05', date: '0.6', cBg: '0.05', cBorder: '0.1', cHover: '0.1' };
        var r = document.documentElement.style;
        r.setProperty('--bg', s.bg);
        r.setProperty('--text', s.text);
        r.setProperty('--accent', s.accent);
        r.setProperty('--accent-dim', s.accent);
        r.setProperty('--card-bg', 'rgba(' + base + ', ' + o.card + ')');
        r.setProperty('--card-border', 'rgba(' + base + ', ' + o.border + ')');
        r.setProperty('--card-bg-hover', 'rgba(' + base + ', ' + o.hover + ')');
        r.setProperty('--date', 'rgba(' + base + ', ' + o.date + ')');
        r.setProperty('--control-bg', 'rgba(' + base + ', ' + o.cBg + ')');
        r.setProperty('--control-border', 'rgba(' + base + ', ' + o.cBorder + ')');
        r.setProperty('--control-bg-hover', 'rgba(' + base + ', ' + o.cHover + ')');
      } catch (e) {}
    })();
  </script>
</head>
<body>

  <div class="blog-post-container">
    <nav class="blog-nav">
      <a href="/">← Back to Blog</a>
    </nav>

    <article class="blog-post">
      <h1 class="blog-post-title" id="post-title"></h1>
      <div id="post-date" class="article-date"></div>
      <div id="post-error" class="feedback-error" style="display:none;"></div>
      <div class="blog-content" id="post-content"></div>
    </article>
  </div>

  <script src="/theme.js"></script>

  <section id="feedback" class="feedback-section" data-slug="">
    <h2 class="feedback-title">Feedback</h2>
    <div id="feedback-error" class="feedback-error" style="display:none;"></div>
    <div id="feedback-list" class="feedback-list"></div>
    <form id="feedback-form" class="feedback-form">
      <input type="text" id="feedback-name" class="feedback-input" placeholder="Name (optional)">
      <textarea id="feedback-body" class="feedback-textarea" placeholder="Leave feedback..." required></textarea>
      <button type="submit" class="feedback-submit">Post Feedback</button>
    </form>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/supabase-config.js"></script>
  <script src="/post-utils.js"></script>
  <script src="/feedback-render.js"></script>
  <script src="/post-page.js"></script>
  <script src="/analytics.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
