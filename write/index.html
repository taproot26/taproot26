<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Write</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="blog-post-container" style="max-width:720px;">
    <h1 class="blog-post-title">New Post</h1>
    <form id="write-form" class="feedback-form">
      <input type="text" id="post-title" class="feedback-input" placeholder="Title" required>
      <select id="post-category" class="feedback-input">
        <option value="technical">Technical</option>
        <option value="lifestyle">Lifestyle</option>
      </select>
      <input type="text" id="slug-preview" class="feedback-input" placeholder="slug" readonly tabindex="-1">
      <textarea id="post-body" class="feedback-textarea" style="min-height:320px;" placeholder="Write. Blank line = new paragraph." required></textarea>
      <input type="password" id="publish-pass" class="feedback-input" placeholder="Publish password" required autocomplete="off">
      <button type="submit" class="feedback-submit">Publish</button>
      <div id="write-error" class="feedback-error" style="display:none;"></div>
      <div id="write-success" style="display:none;"></div>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/supabase-config.js"></script>
  <script src="/post-utils.js"></script>
  <script src="/write.js"></script>
  <script src="/theme.js"></script>
</body>
</html>
